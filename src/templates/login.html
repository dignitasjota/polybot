<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Polymarket Bot</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: 'Courier New', monospace; background: #0a0a0a; color: #e0e0e0;
        display: flex; justify-content: center; align-items: center; min-height: 100vh;
    }
    .login-box {
        background: #0d0d1a; border: 1px solid #333; border-radius: 8px;
        padding: 30px; width: 320px;
    }
    h1 { color: #00ff88; font-size: 1.2em; margin-bottom: 20px; text-align: center; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; color: #888; font-size: 0.8em; margin-bottom: 5px; text-transform: uppercase; }
    .form-group input {
        width: 100%; background: #1a1a2e; border: 1px solid #333; color: #e0e0e0;
        padding: 10px; border-radius: 4px; font-family: 'Courier New', monospace; font-size: 0.9em;
    }
    .form-group input:focus { outline: none; border-color: #00aaff; }
    .btn {
        width: 100%; background: #00aaff; border: none; color: #000;
        padding: 10px; border-radius: 4px; cursor: pointer;
        font-family: 'Courier New', monospace; font-size: 0.9em; font-weight: bold;
    }
    .btn:hover { background: #00ccff; }
    .error { color: #ff4444; font-size: 0.85em; margin-bottom: 10px; text-align: center; }
</style>
</head>
<body>
    <div class="login-box">
        <h1>POLYMARKET BOT</h1>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <form method="POST" action="/login">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" autocomplete="username" autofocus required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn">LOGIN</button>
        </form>
    </div>
</body>
</html>
