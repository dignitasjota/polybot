# config/config.toml — Directional (Opción B: Rentabilidad via parámetros conservadores)
#
# CAMBIOS (2026-04-08):
# La estrategia anterior perdía dinero porque apostaba a precios altos (0.90+) que exigen
# WR > 90% para rentabilidad. Con WR real ~82%, el EV era negativo (-4.3% por round).
#
# AJUSTES APLICADOS:
# - max_price: 0.95 → 0.70 (evita precios suicidas)
# - min_margin_net: 0.008 → 0.05 (pedir 5 centavos mínimo neto)
# - min_buffer_pct: 0.0008 → 0.003 (4× más buffer, reduce ruido Binance)
# - crypto buffers: todos ×4 (Bitcoin 0.2%, Ethereum 0.3%, etc.)
# - max_bet_pct: 3% → 1% (menos exposición por bet)
# - max_daily_loss: 100 → 20 (stop loss temprano)
# - max_concurrent_bets: 5 → 3 (menos correlación)
#
# RESULTADO ESPERADO:
# Menos bets (~3-5/día vs 15-20), pero con EV positivo (+15-20% anual si WR=82%).
# Cifra de corte conservadora: cualquier bet con EV < +$0.01 se rechaza automáticamente.

[strategy]
enabled = true
name = "closing_arbitrage"

# Criterios de entrada
max_time_to_resolution = "15m"    # Busca mercados que resuelven en <15min (captura los de 5min a tiempo)
min_margin_net = 0.05             # Margen minimo por share tras fees ($0.05) — aumentado de 0.008, EV positivo
tag = "crypto"                    # Solo mercados con tag crypto
max_price = 0.55                  # Precio maximo para bets Up/Down (bajado de 0.70 a 0.55 — con 66% WR, EV positivo solo bajo 0.60)
min_price_updown = 0.10           # Precio minimo para bets Up/Down (evita tokens a $0.001 sin sentido)
min_margin_closing = 0.005        # Margen minimo neto para closing arb (separado de min_margin_net)
min_buffer_pct = 0.001            # Buffer minimo como fraccion decimal (0.001 = 0.1%) para confirmacion Binance
max_concurrent_bets = 3           # Max bets directionales concurrentes (bajado de 5 a 3, menos correlación)

# Configuracion per-crypto para directional Up/Down
# enabled = false desactiva el trading de esa crypto
# buffer_pct = cambio minimo en Binance como fraccion decimal (0.001 = 0.1%)
# Cuanto mayor volatilidad, mayor buffer necesario para filtrar ruido
[strategy.crypto_configs.bitcoin]
enabled = true
buffer_pct = 0.001     # 0.1% — BTC ~$84 movimiento mínimo

[strategy.crypto_configs.ethereum]
enabled = true
buffer_pct = 0.0015    # 0.15%

[strategy.crypto_configs.solana]
enabled = true
buffer_pct = 0.002     # 0.20% — altcoin, más ruido

[strategy.crypto_configs.bnb]
enabled = true
buffer_pct = 0.0015    # 0.15%

[strategy.crypto_configs.dogecoin]
enabled = true
buffer_pct = 0.0025    # 0.25% — meme coin, mucho ruido

[strategy.crypto_configs.xrp]
enabled = true
buffer_pct = 0.002     # 0.20%

[strategy.crypto_configs.cardano]
enabled = true
buffer_pct = 0.0025    # 0.25%

[strategy.crypto_configs.avalanche]
enabled = true
buffer_pct = 0.0025    # 0.25%

[strategy.crypto_configs.polkadot]
enabled = true
buffer_pct = 0.0025    # 0.25%

[strategy.crypto_configs.polygon]
enabled = true
buffer_pct = 0.0025    # 0.25%

[strategy.crypto_configs.chainlink]
enabled = true
buffer_pct = 0.002     # 0.20%

[strategy.crypto_configs.litecoin]
enabled = true
buffer_pct = 0.0001    # 0.01% — permisivo

[strategy.crypto_configs.sui]
enabled = true
buffer_pct = 0.0001    # 0.01% — permisivo

[strategy.crypto_configs.pepe]
enabled = true
buffer_pct = 0.0001    # 0.01% — permisivo

[strategy.crypto_configs.hyperliquid]
enabled = false
buffer_pct = 0.0001    # 0.01%

# Probabilidad minima escalada segun tiempo restante
# Cuanto menos tiempo queda, mas agresivos somos (menos prob exigimos)
# porque hay menos probabilidad de que se de la vuelta
# Se evalua de arriba a abajo: la primera que cumpla (tiempo < max_hours) aplica
[[strategy.probability_tiers]]
max_hours = 0.08   # < 5 min
min_probability = 0.98        # aumentado de 0.97

[[strategy.probability_tiers]]
max_hours = 0.25   # < 15 min
min_probability = 0.985       # aumentado de 0.98, más selectivo

[[strategy.probability_tiers]]
max_hours = 0.5    # < 30 min
min_probability = 0.99        # igual, pero más selectivo con margin

[[strategy.probability_tiers]]
max_hours = 1      # < 1h
min_probability = 0.99        # no apostar mercados de >1h

[risk]
max_bet_pct = 1.0                 # % del balance por apuesta (bajado de 3% a 1%, menos daño por loss)
max_bet_per_trade = 50.0          # Tope absoluto por trade (bajado de 200 a 50)
max_position_per_market = 100.0   # Exposicion maxima por mercado (bajado de 400)
max_total_exposure = 300.0        # Exposicion total abierta (bajado de 1000)
max_daily_loss = 20.0             # Stop-loss diario (bajado de 100 a 20, circuit breaker temprano)
max_concurrent_positions = 5      # Posiciones abiertas simultaneas (bajado de 25)
kill_switch = false               # true = detener todo inmediatamente
simulated_balance = 1000.0         # Capital inicial simulado para paper trading ($)

[data]
stale_data_threshold_seconds = 5  # Pausar si datos >5s antiguos
gamma_poll_interval_seconds = 30  # Polling Gamma API cada 30s (mercados de 5 min rotan rapido)
max_markets_monitored = 200        # Maximo mercados a monitorear

[websocket]
ping_interval_seconds = 10
pong_timeout_seconds = 5
reconnect_max_delay_ms = 2000
reconnect_jitter_pct = 20
fallback_rest_interval_ms = 500

[logging]
level = "INFO"
format = "json"
file = "logs/bot.jsonl"
max_file_size_mb = 100
rotate_count = 5

# ── Cuentas de trading ──────────────────────────────────────────────────
# Cada [[accounts]] es independiente: su propia estrategia, credenciales y riesgo.
# Si no se definen cuentas, se crea una cuenta "default" directional en paper.

# Cuenta 1: Estrategia direccional (Binance)
[[accounts]]
name = "directional_main"
enabled = true
strategy_type = "directional"
execution_mode = "paper"  # Cambiar a "live" manualmente cuando esté listo

[accounts.credentials]
private_key_env = "PRIVATE_KEY"
api_key_env = "POLYMARKET_API_KEY"
api_secret_env = "POLYMARKET_SECRET"
passphrase_env = "POLYMARKET_PASSPHRASE"
signature_type_env = "WALLET_TYPE"
proxy_address_env = "POLYMARKET_PROXY_ADDRESS"
builder_key_env = "BUILDER_API_KEY"
builder_secret_env = "BUILDER_SECRET"
builder_passphrase_env = "BUILDER_PASSPHRASE"

# Cuenta 2: Completeness Arbitrage (compra YES+NO cuando suma < $1.00)
[[accounts]]
name = "completeness_arb"
enabled = true
strategy_type = "completeness"
execution_mode = "paper"  # Cambiar a "live" cuando directional esté en live

[accounts.credentials]
private_key_env = "PRIVATE_KEY"
api_key_env = "POLYMARKET_API_KEY"
api_secret_env = "POLYMARKET_SECRET"
passphrase_env = "POLYMARKET_PASSPHRASE"
signature_type_env = "WALLET_TYPE"
proxy_address_env = "POLYMARKET_PROXY_ADDRESS"
builder_key_env = "BUILDER_API_KEY"
builder_secret_env = "BUILDER_SECRET"
builder_passphrase_env = "BUILDER_PASSPHRASE"

[accounts.completeness]
scan_interval = 2                    # Cada 2 segundos (gaps duran <1s, necesitamos rapidez)
min_profit_per_share = 0.003         # Mínimo $0.003/share neto ($0.30 por 100 shares) — bajado para captar más
min_shares = 5                       # Mínimo 5 shares para ejecutar
max_cost_per_trade = 50.0            # Máximo $50 por trade
cooldown_s = 10                      # 10s antes de reintentar mismo mercado (era 30, muy largo)
category = "crypto"                  # Categoría de fees fallback (auto-detecta desde Gamma API)

[accounts.risk]
simulated_balance = 500.0

# Cuenta 3: Copy-trading (paper trading para evaluar rentabilidad)
[[accounts]]
name = "copy_vidarx"
enabled = true
strategy_type = "copy_trade"
execution_mode = "paper"  # Cambiar a "live" manualmente después de validar

[accounts.credentials]
private_key_env = "COPY_PRIVATE_KEY"
api_key_env = "COPY_API_KEY"
api_secret_env = "COPY_SECRET"
passphrase_env = "COPY_PASSPHRASE"
signature_type_env = "COPY_WALLET_TYPE"
proxy_address_env = "COPY_PROXY_ADDRESS"
builder_key_env = "BUILDER_API_KEY"
builder_secret_env = "BUILDER_SECRET"
builder_passphrase_env = "BUILDER_PASSPHRASE"

[accounts.copy_trade]
target_wallets = [
    "0x2d8b401d2f0e6937afebf18e19e11ca568a5260a",  # vidarx
    "0x674b949283ea2eb33c2cad519a3e2f26b3144f07",  # para888
    "0x45bc74efa620b45c02308acaecdff1f7c06f978b",  # 0xbbc5z (BTC heavy, $517K)
]
poll_interval_ms = 500
max_latency_ms = 120000  # 120s para paper trading (en live bajar a 5000-10000)
copy_size_mode = "fixed"
fixed_bet_size = 5.0
min_price = 0.50                  # Precio minimo para copiar trades (hedges exentos)
max_concurrent_bets = 3           # Max bets copy concurrentes
spread_arb_multiplier = 3.0       # Multiplicador de bet cuando detecta arb (ambos lados < $1)

[accounts.risk]
max_bet_per_trade = 50.0
max_daily_loss = 50.0
max_concurrent_positions = 10
simulated_balance = 500.0

# Cuenta 3: Liquidity Rewards (Fases 1-5: Scanner + Provider + Risk + Metrics)
[[accounts]]
name = "liquidity_rewards"
enabled = true
strategy_type = "liquidity"
execution_mode = "paper"  # Cambiar a "dry_run" o "live" cuando esté listo

[accounts.credentials]
private_key_env = "PRIVATE_KEY"
api_key_env = "POLYMARKET_API_KEY"
api_secret_env = "POLYMARKET_SECRET"
passphrase_env = "POLYMARKET_PASSPHRASE"
signature_type_env = "WALLET_TYPE"
proxy_address_env = "POLYMARKET_PROXY_ADDRESS"
builder_key_env = "BUILDER_API_KEY"
builder_secret_env = "BUILDER_SECRET"
builder_passphrase_env = "BUILDER_PASSPHRASE"

[accounts.liquidity]
# Fase 1: Scanner
scan_interval = 300                 # Segundos entre scans de mercados con rewards
min_daily_rate = 1.0                # Mínimo $/día para considerar un mercado
min_reward_per_dollar = 0.001       # Ratio mínimo reward/competencia

# Fase 2: Provider (con asignación dinámica de capital)
# En lugar de capital fijo por mercado, cada mercado obtiene:
# capital_needed = min_size * midpoint * 2 * 1.2
# Esto permite abrir más mercados diversificados en lugar de N fijos.
#
# En LIVE mode: se obtiene el balance USDC de Polymarket cada 5 minutos (cacheado para no saturar)
# En PAPER mode: se usa total_capital como simulado
# El bot abre mercados en orden de preferencia hasta agotar el capital disponible.
capital_per_market = 34.0           # Fallback si no se usa asignación dinámica (legacy)
max_markets = 15                    # Máximo mercados (más diversificación, menos riesgo concentrado)
total_capital = 500.0               # Fallback/inicial. En live se obtiene dinámicamente de Polymarket
quote_refresh_s = 15                # Refresh cada 15s — más agresivo en posición, necesita reaccionar rápido
spread_pct_of_max = 0.50            # 50% de max_spread (~2.3¢ del midpoint, +43% rewards vs 0.65)
# max_min_size se auto-calcula: min_size * midpoint * 2 * 1.2

# Fase 3: Risk & Inventory
max_inventory_skew = 0.6            # |skew| antes de rebalanceo automático
emergency_cancel_midpoint_move_pct = 0.05  # 5% — cancela todo en ese mercado
adverse_abandonment_ratio = 0.7     # Mercado abandonado si ratio > 0.7

# Auto-exit de posiciones unmatched (libera capital bloqueado)
auto_exit_enabled = true            # Activar salida automática de posiciones no-matched
auto_exit_timeout_s = 60            # Vender posición unmatched tras 60s (libera capital rápido)
auto_exit_max_loss_pct = 0.02       # Aceptar máximo 2% pérdida al exitarse (minimizar daño)

# Fase 3.5: Heartbeat & Scoring
use_heartbeat = true                # Activar heartbeat loop
heartbeat_interval = 5              # Segundos entre heartbeats
scoring_check_interval = 60         # Segundos entre checks de scoring

# Block hiding
min_block_usd = 5000.0              # USD mínimo para detectar order block
block_hide_distance_ticks = 1       # Distancia atrás del block (ticks)

[accounts.risk]
simulated_balance = 500.0           # Capital inicial para paper trading

# Cuenta 5: Weather Prediction (predicción meteorológica con ensemble models)
[[accounts]]
name = "weather_forecast"
enabled = true
strategy_type = "weather"
execution_mode = "paper"  # Cambiar a "live" después de validar

[accounts.credentials]
private_key_env = "PRIVATE_KEY"
api_key_env = "POLYMARKET_API_KEY"
api_secret_env = "POLYMARKET_SECRET"
passphrase_env = "POLYMARKET_PASSPHRASE"
signature_type_env = "WALLET_TYPE"
proxy_address_env = "POLYMARKET_PROXY_ADDRESS"
builder_key_env = "BUILDER_API_KEY"
builder_secret_env = "BUILDER_SECRET"
builder_passphrase_env = "BUILDER_PASSPHRASE"

[accounts.weather]
scan_interval = 900                  # Cada 15 min (pronósticos no cambian rápido)
forecast_cache_ttl = 3600            # Cache forecasts 1 hora
max_forecast_days = 3                # Solo mercados a ≤3 días (forecast fiable)
min_edge = 0.08                      # Mínimo 8% edge para apostar
min_forecast_prob = 0.15             # No apostar en outcomes con <15% prob (ruido)
min_agreement = 0.20                 # Al menos 20% de los 51 modelos deben coincidir
max_price = 0.75                     # No comprar outcomes >75¢ (poco upside)
max_bet_per_trade = 10.0             # Conservador: $10 max por trade
bankroll = 200.0                     # Capital total para weather
kelly_multiplier = 0.25              # Quarter-Kelly (conservador)
max_bets_per_cycle = 3               # Max 3 trades por ciclo de scan
resolution_check_interval = 3600     # Verificar resoluciones cada hora

[accounts.risk]
simulated_balance = 200.0
