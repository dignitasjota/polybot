# config/config.toml — Directional (Opción B: Rentabilidad via parámetros conservadores)
#
# CAMBIOS (2026-04-08):
# La estrategia anterior perdía dinero porque apostaba a precios altos (0.90+) que exigen
# WR > 90% para rentabilidad. Con WR real ~82%, el EV era negativo (-4.3% por round).
#
# AJUSTES APLICADOS:
# - max_price: 0.95 → 0.70 (evita precios suicidas)
# - min_margin_net: 0.008 → 0.05 (pedir 5 centavos mínimo neto)
# - min_buffer_pct: 0.0008 → 0.003 (4× más buffer, reduce ruido Binance)
# - crypto buffers: todos ×4 (Bitcoin 0.2%, Ethereum 0.3%, etc.)
# - max_bet_pct: 3% → 1% (menos exposición por bet)
# - max_daily_loss: 100 → 20 (stop loss temprano)
# - max_concurrent_bets: 5 → 3 (menos correlación)
#
# RESULTADO ESPERADO:
# Menos bets (~3-5/día vs 15-20), pero con EV positivo (+15-20% anual si WR=82%).
# Cifra de corte conservadora: cualquier bet con EV < +$0.01 se rechaza automáticamente.

[strategy]
enabled = true
name = "closing_arbitrage"

# Criterios de entrada
max_time_to_resolution = "15m"    # Busca mercados que resuelven en <15min (captura los de 5min a tiempo)
min_margin_net = 0.05             # Margen minimo por share tras fees ($0.05) — aumentado de 0.008, EV positivo
tag = "crypto"                    # Solo mercados con tag crypto
max_price = 0.70                  # Precio maximo para bets Up/Down directional (bajado de 0.95 a 0.70, evita precios suicidas)
min_buffer_pct = 0.003            # Buffer minimo % para confirmacion de precio Binance (0.3%) — aumentado 4× de 0.08% para reducir ruido
max_concurrent_bets = 3           # Max bets directionales concurrentes (bajado de 5 a 3, menos correlación)

# Configuracion per-crypto para directional Up/Down
# enabled = false desactiva el trading de esa crypto
# buffer_pct = cambio minimo en Binance (%) para confirmar direccion
[strategy.crypto_configs.bitcoin]
enabled = true
buffer_pct = 0.002     # 0.2% — aumentado 4× de 0.05%

[strategy.crypto_configs.ethereum]
enabled = true
buffer_pct = 0.003     # 0.3% — aumentado 4×

[strategy.crypto_configs.solana]
enabled = true
buffer_pct = 0.004     # 0.4% — aumentado 4×

[strategy.crypto_configs.bnb]
enabled = true
buffer_pct = 0.003     # 0.3% — aumentado 4×

[strategy.crypto_configs.dogecoin]
enabled = true
buffer_pct = 0.006     # 0.6% — aumentado 4× meme coin

[strategy.crypto_configs.xrp]
enabled = true
buffer_pct = 0.004     # 0.4% — aumentado 4×

[strategy.crypto_configs.cardano]
enabled = true
buffer_pct = 0.004     # 0.4% — aumentado 4×

[strategy.crypto_configs.avalanche]
enabled = true
buffer_pct = 0.004     # 0.4% — aumentado 4×

[strategy.crypto_configs.polkadot]
enabled = true
buffer_pct = 0.004     # 0.4% — aumentado 4×

[strategy.crypto_configs.polygon]
enabled = true
buffer_pct = 0.004     # 0.4% — aumentado 4×

[strategy.crypto_configs.chainlink]
enabled = true
buffer_pct = 0.004     # 0.4% — aumentado 4×

[strategy.crypto_configs.litecoin]
enabled = true
buffer_pct = 0.004     # 0.4% — aumentado 4×

[strategy.crypto_configs.sui]
enabled = true
buffer_pct = 0.005     # 0.5% — aumentado 4× alta volatilidad

[strategy.crypto_configs.pepe]
enabled = true
buffer_pct = 0.006     # 0.6% — aumentado 4× meme coin

[strategy.crypto_configs.hyperliquid]
enabled = false
buffer_pct = 0.001

# Probabilidad minima escalada segun tiempo restante
# Cuanto menos tiempo queda, mas agresivos somos (menos prob exigimos)
# porque hay menos probabilidad de que se de la vuelta
# Se evalua de arriba a abajo: la primera que cumpla (tiempo < max_hours) aplica
[[strategy.probability_tiers]]
max_hours = 0.08   # < 5 min
min_probability = 0.98        # aumentado de 0.97

[[strategy.probability_tiers]]
max_hours = 0.25   # < 15 min
min_probability = 0.985       # aumentado de 0.98, más selectivo

[[strategy.probability_tiers]]
max_hours = 0.5    # < 30 min
min_probability = 0.99        # igual, pero más selectivo con margin

[[strategy.probability_tiers]]
max_hours = 1      # < 1h
min_probability = 0.99        # no apostar mercados de >1h

[risk]
max_bet_pct = 1.0                 # % del balance por apuesta (bajado de 3% a 1%, menos daño por loss)
max_bet_per_trade = 50.0          # Tope absoluto por trade (bajado de 200 a 50)
max_position_per_market = 100.0   # Exposicion maxima por mercado (bajado de 400)
max_total_exposure = 300.0        # Exposicion total abierta (bajado de 1000)
max_daily_loss = 20.0             # Stop-loss diario (bajado de 100 a 20, circuit breaker temprano)
max_concurrent_positions = 5      # Posiciones abiertas simultaneas (bajado de 25)
kill_switch = false               # true = detener todo inmediatamente
simulated_balance = 1000.0         # Capital inicial simulado para paper trading ($)

[data]
stale_data_threshold_seconds = 5  # Pausar si datos >5s antiguos
gamma_poll_interval_seconds = 30  # Polling Gamma API cada 30s (mercados de 5 min rotan rapido)
max_markets_monitored = 200        # Maximo mercados a monitorear

[websocket]
ping_interval_seconds = 10
pong_timeout_seconds = 5
reconnect_max_delay_ms = 2000
reconnect_jitter_pct = 20
fallback_rest_interval_ms = 500

[logging]
level = "INFO"
format = "json"
file = "logs/bot.jsonl"
max_file_size_mb = 100
rotate_count = 5

# ── Cuentas de trading ──────────────────────────────────────────────────
# Cada [[accounts]] es independiente: su propia estrategia, credenciales y riesgo.
# Si no se definen cuentas, se crea una cuenta "default" directional en paper.

# Cuenta 1: Estrategia direccional (Binance)
[[accounts]]
name = "directional_main"
enabled = true
strategy_type = "directional"
execution_mode = "paper"  # Cambiar a "live" manualmente cuando esté listo

[accounts.credentials]
private_key_env = "PRIVATE_KEY"
api_key_env = "POLYMARKET_API_KEY"
api_secret_env = "POLYMARKET_SECRET"
passphrase_env = "POLYMARKET_PASSPHRASE"
signature_type_env = "WALLET_TYPE"
proxy_address_env = "POLYMARKET_PROXY_ADDRESS"
builder_key_env = "BUILDER_API_KEY"
builder_secret_env = "BUILDER_SECRET"
builder_passphrase_env = "BUILDER_PASSPHRASE"

# Cuenta 2: Copy-trading (paper trading para evaluar rentabilidad)
[[accounts]]
name = "copy_vidarx"
enabled = true
strategy_type = "copy_trade"
execution_mode = "paper"  # Cambiar a "live" manualmente después de validar

[accounts.credentials]
private_key_env = "COPY_PRIVATE_KEY"
api_key_env = "COPY_API_KEY"
api_secret_env = "COPY_SECRET"
passphrase_env = "COPY_PASSPHRASE"
signature_type_env = "COPY_WALLET_TYPE"
proxy_address_env = "COPY_PROXY_ADDRESS"
builder_key_env = "BUILDER_API_KEY"
builder_secret_env = "BUILDER_SECRET"
builder_passphrase_env = "BUILDER_PASSPHRASE"

[accounts.copy_trade]
target_wallets = [
    "0x2d8b401d2f0e6937afebf18e19e11ca568a5260a",  # vidarx
    "0x674b949283ea2eb33c2cad519a3e2f26b3144f07",  # para888
    "0x45bc74efa620b45c02308acaecdff1f7c06f978b",  # 0xbbc5z (BTC heavy, $517K)
]
poll_interval_ms = 500
max_latency_ms = 120000  # 120s para paper trading (en live bajar a 5000-10000)
copy_size_mode = "fixed"
fixed_bet_size = 5.0
min_price = 0.50                  # Precio minimo para copiar trades (hedges exentos)
max_concurrent_bets = 3           # Max bets copy concurrentes
spread_arb_multiplier = 3.0       # Multiplicador de bet cuando detecta arb (ambos lados < $1)

[accounts.risk]
max_bet_per_trade = 50.0
max_daily_loss = 50.0
max_concurrent_positions = 10
simulated_balance = 500.0
