# config/config.toml — Closing Arbitrage (Fase 1.1: Observador)

[strategy]
enabled = true
name = "closing_arbitrage"

# Criterios de entrada
max_time_to_resolution = "24h"    # Solo mercados que resuelven en <24h
min_margin_net = 0.008            # Margen minimo por share tras fees ($0.008)

# Probabilidad minima escalada segun tiempo restante
# Cuanto mas tiempo falta, mas certeza exigimos
# Formato: cada entrada es [horas_limite, probabilidad_minima]
# Se evalua de arriba a abajo: la primera que cumpla (tiempo < horas_limite) aplica
[[strategy.probability_tiers]]
max_hours = 0.5    # < 30 min
min_probability = 0.93

[[strategy.probability_tiers]]
max_hours = 2      # 30 min - 2h
min_probability = 0.95

[[strategy.probability_tiers]]
max_hours = 6      # 2h - 6h
min_probability = 0.97

[[strategy.probability_tiers]]
max_hours = 24     # 6h - 24h
min_probability = 0.99

[risk]
max_bet_per_trade = 200.0         # Maximo invertido por trade ($)
max_position_per_market = 400.0   # Exposicion maxima por mercado ($)
max_total_exposure = 1000.0       # Exposicion total abierta ($)
max_daily_loss = 100.0            # Stop-loss diario ($)
max_concurrent_positions = 5      # Posiciones abiertas simultaneas
kill_switch = false               # true = detener todo inmediatamente

[data]
stale_data_threshold_seconds = 5  # Pausar si datos >5s antiguos
gamma_poll_interval_seconds = 300 # Polling Gamma API cada 5 min
max_markets_monitored = 20        # Maximo mercados a monitorear

[websocket]
ping_interval_seconds = 10
pong_timeout_seconds = 5
reconnect_max_delay_ms = 2000
reconnect_jitter_pct = 20
fallback_rest_interval_ms = 500

[logging]
level = "INFO"
format = "json"
file = "logs/bot.jsonl"
max_file_size_mb = 100
rotate_count = 5
